<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>
{{ base_style | safe }}
<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

.nav {
    background:#111827;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.nav a {
    color:#60a5fa;
    margin-right:12px;
    text-decoration:none;
    font-weight:bold;
}

.nav a:hover {
    color:white;
}

.container {
    width:90%;
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card {
    background:#1e293b;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
}

input {
    padding:8px;
    margin:5px;
    border-radius:6px;
    border:none;
}

button {
    padding:8px 12px;
    background:#22c55e;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover {
    background:#16a34a;
}
</style>
</head>

<body>

<div class="nav">
    <div>
        <a href="/dashboard">🏠 Dashboard</a>
        {% if session.role == "admin" %}
            <a href="/admin">⚙️ Admin</a>
        {% endif %}
        <a href="/predictions">📊 Predictions</a>
        <a href="/groups">📊 Groups</a>
        <a href="/standings">📊 Standings</a>
    </div>

    <div>
        <a href="javascript:history.back()">🔙 Back</a>
        <a href="/logout">🚪 Logout</a>
    </div>
</div>

<div class="container">

<h1>🏆 Leaderboard</h1>

<div class="card">

<table border="1" width="100%" style="color:white;">

<tr>
    <th>Player</th>
    <th>Points</th>
    <th>Exact</th>
    <th>Results</th>
    <th>Scorers</th>
    <th>Profile</th>
</tr>

{% for u in users %}
<tr>
    <td>{{ u[0] }}</td>
    <td>{{ u[1] }}</td>
    <td>{{ u[2] }}</td>
    <td>{{ u[3] }}</td>
    <td>{{ u[4] }}</td>
    <td><a href="/profile/{{ u[0] }}">👤 View</a></td>
</tr>
{% endfor %}

</table>

</div>

</div>

</body>
</html>
