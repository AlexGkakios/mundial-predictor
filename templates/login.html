<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.login-box {

    width:90%;
    max-width:360px;

    background:#1e293b;

    padding:30px;

    border-radius:16px;

    box-shadow:0 0 25px rgba(0,0,0,0.35);
}

h1 {
    text-align:center;
    margin-bottom:10px;
}

.subtitle {
    text-align:center;
    color:#94a3b8;
    margin-bottom:25px;
}

input {

    display:block;

    width:85%;
    max-width:300px;

    margin:0 auto 12px auto;

    padding:12px;

    border:none;
    border-radius:8px;

    font-size:16px;

    box-sizing:border-box;
}

button {

    display:block;

    width:85%;
    max-width:300px;

    margin:auto;

    padding:12px;

    background:#22c55e;
    color:white;

    border:none;
    border-radius:8px;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;
}

button:hover {
    background:#16a34a;
}

.error {

    background:#7f1d1d;

    padding:10px;

    border-radius:8px;

    margin-bottom:15px;

    text-align:center;
}

@media (max-width: 600px) {

    .login-box {
        width:90%;
        padding:20px;
    }

    input,
    button {
        width:100%;
        max-width:none;
    }

    h1 {
        font-size:24px;
    }
}

</style>

</head>

<body>

<div class="container">

<h2>⚽ Mundial Predictor 2026</h2>

<div class="card">

{% if error %}
<div style="
background:#7f1d1d;
color:white;
padding:10px;
border-radius:8px;
margin-bottom:15px;
">
    {{ error }}
</div>
{% endif %}
    
<form method="POST" action="/login">

    <input name="username" required>
    <input name="password" type="password" required>

    <button type="submit">Login</button>

</form>

</div>

</div>

</body>
</html>
