<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

.nav {
    background:#111827;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.nav a {
    color:#60a5fa;
    margin-right:12px;
    text-decoration:none;
    font-weight:bold;
}

.nav a:hover {
    color:white;
}

.container {
    width:90%;
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card {
    background:#1e293b;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    text-align:center;
    border-bottom:1px solid #334155;
}

button {
    padding:5px 8px;
    margin:2px;
    background:#22c55e;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
}

button:hover {
    background:#16a34a;
}

form {
    display:inline;
}
</style>

</head>

<body>

<div class="container">

<h2>⚽ Mundial Predictor 2026</h2>

<div class="card">

{% if error %}
<div style="
background:#7f1d1d;
color:white;
padding:10px;
border-radius:8px;
margin-bottom:15px;
">
    {{ error }}
</div>
{% endif %}
    
<form method="POST" action="/login">

    <input name="username" required>
    <input name="password" type="password" required>

    <button type="submit">Login</button>

</form>

</div>

</div>

</body>
</html>
