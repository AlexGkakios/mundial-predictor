<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;

    display:flex;
    justify-content:center;

    min-height:100vh;

    padding-top:120px;
    box-sizing:border-box;
}

.login-box {

    width:90%;
    max-width:500px;

    background:#1e293b;

    padding:40px;

    border-radius:18px;

    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1 {
    text-align:center;
    margin-bottom:10px;
    font-size:38px;
}

.subtitle {
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
    font-size:18px;
}

input {

    display:block;

    width:100%;
    box-sizing:border-box;

    padding:14px;

    margin-bottom:15px;

    border:none;
    border-radius:10px;

    font-size:17px;
}

button {

    width:100%;

    padding:14px;

    background:#22c55e;
    color:white;

    border:none;
    border-radius:10px;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;
}

button:hover {
    background:#16a34a;
}

.error {

    background:#7f1d1d;

    padding:12px;

    border-radius:10px;

    margin-bottom:20px;

    text-align:center;
}

@media (max-width: 600px) {

    body {

        justify-content:center;
        align-items:center;

        padding-top:0;

        min-height:100vh;
    }

    .login-box {

        width:92%;

        max-width:none;

        padding:35px 25px;
    }

    h1 {
        font-size:32px;
    }

    .subtitle {
        font-size:17px;
    }

    input {
        padding:16px;
        font-size:18px;
    }

    button {
        padding:16px;
        font-size:18px;
    }
}

</style>

</head>

<body>

<div class="container">

<h2>⚽ Mundial Predictor 2026</h2>

<div class="card">

{% if error %}
<div style="
background:#7f1d1d;
color:white;
padding:10px;
border-radius:8px;
margin-bottom:15px;
">
    {{ error }}
</div>
{% endif %}
    
<form method="POST" action="/login">

    <input name="username" required>
    <input name="password" type="password" required>

    <button type="submit">Login</button>

</form>

</div>

</div>

</body>
</html>
